openapi: 3.1.0
info:
  title: Becker - Base de Conhecimento Jurídico
  description: Consulta a base de conhecimento (doutrina/estratégia/prova digital), a jurisprudência verificada do escritório, processos no DataJud CNJ e cálculo de prazos.
  version: 1.1.0
servers:
  - url: https://bpzuktssvdosxlxbaeyl.supabase.co/functions/v1
    description: Edge Functions — buscar (knowledge base)
  - url: https://bpzuktssvdosxlxbaeyl.supabase.co/functions/v1/becker-juris
    description: Edge Functions — becker-juris (processos e prazos)
paths:
  /buscar:
    post:
      operationId: buscarConhecimento
      summary: Busca híbrida na base de conhecimento ou na jurisprudência verificada.
      description: >
        Use tabela="base" para método, teses, impugnações, prova digital e peças de referência.
        Use tabela="jurisprudencia" para precedentes (retorna SOMENTE precedentes verificados).
        Sempre consulte esta ação ANTES de redigir qualquer peça ou afirmar tese.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Pergunta ou tema em linguagem natural.
                tabela:
                  type: string
                  enum: [base, jurisprudencia]
                  default: base
                materia:
                  type: string
                  description: Filtro opcional (ex. "RMC", "Fraude bancária", "Revisional").
                tipo_peca:
                  type: string
                  description: Filtro opcional (ex. "INICIAL", "RÉPLICA", "RECURSO").
                pasta:
                  type: string
                  enum: [AUDITORIA_2026, FUNDACAO, MATERIAS, IMPUGNACOES, PROVA_DIGITAL_AVANCADA, PECAS_REFERENCIA]
                nivel:
                  type: string
                  enum: [CRÍTICO, ALTO, MÉDIO, BAIXO]
                tema:
                  type: string
                  description: Filtro de jurisprudência (ex. "RMC", "Busca e apreensão").
                tribunal:
                  type: string
                  enum: [STJ, TJSC, STF]
                incluir_lacuna:
                  type: boolean
                  default: true
                k:
                  type: integer
                  default: 8
      responses:
        "200":
          description: Resultados ordenados por relevância.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultados:
                    type: array
                    items:
                      type: object

  /processos/buscar:
    post:
      operationId: buscarProcesso
      servers:
        - url: https://bpzuktssvdosxlxbaeyl.supabase.co/functions/v1/becker-juris
      summary: Consulta processo pelo número CNJ em qualquer tribunal do DataJud.
      description: >
        Retorna dados completos do processo (classe, assuntos, órgão julgador, grau,
        data de ajuizamento, últimas movimentações). Funciona para TJSC, STJ, STF, TRF,
        TRT e todos os demais tribunais. Use quando o usuário informar o número de processo.
        Resultados não são jurisprudência citável.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [numero]
              properties:
                numero:
                  type: string
                  description: Número CNJ do processo (ex. 0000001-00.2024.8.24.0000).
      responses:
        "200":
          description: Dados do processo.

  /prazos/calcular:
    post:
      operationId: calcularPrazo
      servers:
        - url: https://bpzuktssvdosxlxbaeyl.supabase.co/functions/v1/becker-juris
      summary: Calcula prazo processual em dias úteis (CPC arts. 219, 220, 224).
      description: >
        Calcula a data de vencimento excluindo sábados, domingos e feriados nacionais.
        Use quando o usuário perguntar sobre prazo processual. Sempre exiba o aviso retornado
        sobre suspensões especiais e recessos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data_inicio, dias_uteis]
              properties:
                data_inicio:
                  type: string
                  description: Data de publicação/intimação (AAAA-MM-DD).
                dias_uteis:
                  type: integer
                  minimum: 1
                  maximum: 365
      responses:
        "200":
          description: Prazo calculado com data de vencimento.
