openapi: 3.1.0
info:
  title: Becker Juris Intelligence
  description: Pesquisa jurisprudencial auditável com rastreabilidade documental integral. Cobre cível, bancário e trabalhista. Inclui consulta de processos no DataJud CNJ e cálculo de prazos em dias úteis (CPC).
  version: 1.3.0
servers:
  - url: https://bpzuktssvdosxlxbaeyl.supabase.co/functions/v1/becker-juris
    description: Edge Functions do projeto Becker Juris Intelligence
paths:
  /research/theme:
    post:
      operationId: researchJurisprudenceByTheme
      summary: Pesquisa jurisprudência verificada por tema, área e jurisdição.
      description: >
        Pesquisa o acervo auditado e, quando necessário, captura automaticamente
        documentos do portal oficial. Retorna somente precedentes verificados.
        Nunca responda com jurisprudência de memória — sempre chame esta Action primeiro.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query, area, jurisdiction, methodology_id]
              properties:
                query:
                  type: string
                  description: Tema ou tese em linguagem natural.
                area:
                  type: string
                  enum: [civil, bancario, trabalhista]
                  description: >
                    Área jurídica. Use 'bancario' para RMC/RCC/juros abusivos;
                    'trabalhista' para CLT/horas extras/verbas rescisórias/FGTS/dano moral trabalhista;
                    'civil' para demais casos.
                jurisdiction:
                  type: string
                  description: >-
                    UF do processo ou SC para pesquisa temática sem processo específico.
                    Para trabalhista em SC: TRT12. Para trabalhista nacional: TST.
                  default: SC
                methodology_id:
                  type: string
                  description: Sempre usar '8cb89546-297d-4734-9386-73960ccfa9ef'.
                  default: 8cb89546-297d-4734-9386-73960ccfa9ef
      responses:
        "200":
          description: Resultado auditável com tese, ementa, fundamentação e rastreabilidade.
          content:
            application/json:
              schema:
                type: object
                properties:
                  main_thesis:
                    type: string
                  jurisprudence_for_citation:
                    type: string
                  petition_grounding:
                    type: string
                  becker_headnote:
                    type: object
                  citation_units:
                    type: array
                    items:
                      type: object
        "422":
          description: Evidência insuficiente — nenhum documento auditável localizado.

  /ingest/tjsc:
    post:
      operationId: ingestTJSCJurisprudence
      summary: Captura manual de acórdão do TJSC solicitada pelo usuário.
      description: >
        Use apenas quando o usuário solicitar explicitamente a captura de um
        acórdão específico do TJSC. Não use para preencher lacunas automaticamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [processo]
              properties:
                processo:
                  type: string
                  description: Número CNJ do processo.
      responses:
        "200":
          description: Acórdão capturado e armazenado.

  /ingest/jt:
    post:
      operationId: ingestJTJurisprudence
      summary: Captura manual de acórdão do TRT12 ou TST solicitada pelo usuário.
      description: >
        Use apenas quando o usuário solicitar explicitamente a captura de acórdãos
        trabalhistas do TRT12 (Santa Catarina) ou TST. Não use para preencher lacunas automaticamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query, methodology_id]
              properties:
                query:
                  type: string
                  description: Tema ou número de processo trabalhista.
                tribunal:
                  type: string
                  enum: [TST, TRT12, TRT4, TRT9]
                  description: Tribunal trabalhista. Padrão TRT12 para SC.
                  default: TRT12
                methodology_id:
                  type: string
                  description: Sempre usar '8cb89546-297d-4734-9386-73960ccfa9ef'.
                  default: 8cb89546-297d-4734-9386-73960ccfa9ef
                limit:
                  type: integer
                  minimum: 1
                  maximum: 5
                  default: 3
      responses:
        "201":
          description: Acórdãos trabalhistas capturados e armazenados.
        "404":
          description: Nenhum acórdão localizado.

  /discover/tjsc:
    post:
      operationId: discoverTJSCProcesses
      summary: Localiza metadados processuais no DataJud por tema (não é jurisprudência).
      description: >
        Busca processos por tema/assunto no DataJud TJSC. Retorna apenas metadados processuais.
        Resultados não podem ser citados como jurisprudência. Use /processos/buscar para
        consultar um processo específico pelo número CNJ.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
      responses:
        "200":
          description: Metadados processuais localizados.

  /processos/buscar:
    post:
      operationId: buscarProcesso
      summary: Consulta processo pelo número CNJ em qualquer tribunal do DataJud.
      description: >
        Retorna dados completos do processo (classe, assuntos, órgão julgador, grau,
        data de ajuizamento, últimas movimentações) diretamente do DataJud CNJ.
        Funciona para qualquer tribunal: TJSC, TJSP, TRT, TRF, STJ, STF, TST e outros.
        Use quando o usuário informar o número de processo e quiser saber a situação atual,
        movimentações recentes ou verificar dados antes de protocolar.
        Resultados não são jurisprudência e não podem ser citados como precedente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [numero]
              properties:
                numero:
                  type: string
                  description: >
                    Número CNJ do processo. Formato: 0000001-00.2024.8.24.0000
                    Aceita com ou sem pontuação.
      responses:
        "200":
          description: Dados do processo localizados.
          content:
            application/json:
              schema:
                type: object
                properties:
                  encontrado:
                    type: boolean
                  numero:
                    type: string
                  tribunal:
                    type: string
                  classe:
                    type: string
                  assuntos:
                    type: array
                    items:
                      type: string
                  orgao_julgador:
                    type: string
                  grau:
                    type: string
                  data_ajuizamento:
                    type: string
                  ultimas_movimentacoes:
                    type: array
                    items:
                      type: object
        "502":
          description: Falha na consulta ao DataJud.

  /prazos/calcular:
    post:
      operationId: calcularPrazo
      summary: Calcula prazo processual em dias úteis conforme CPC arts. 219, 220 e 224.
      description: >
        Calcula a data de vencimento de um prazo processual em dias úteis, excluindo
        sábados, domingos e feriados nacionais, com início de contagem no primeiro dia
        útil seguinte à data informada (CPC art. 224 §1º).
        Use quando o usuário perguntar "qual o prazo para...", "quando vence...",
        "tenho X dias úteis a partir de...". Sempre exiba o aviso sobre suspensões especiais.
        Prazos comuns: contestação (15 dias úteis), apelação (15), embargos de declaração (5),
        recurso ordinário trabalhista (8), agravo de instrumento (15).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data_inicio, dias_uteis]
              properties:
                data_inicio:
                  type: string
                  description: >
                    Data de início da contagem (publicação/intimação). Formato: AAAA-MM-DD.
                dias_uteis:
                  type: integer
                  minimum: 1
                  maximum: 365
                  description: Número de dias úteis do prazo.
      responses:
        "200":
          description: Prazo calculado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_inicio:
                    type: string
                  inicio_contagem:
                    type: string
                    description: Primeiro dia útil após a data de início (art. 224 §1º).
                  dias_uteis:
                    type: integer
                  vencimento:
                    type: string
                    description: Data de vencimento (AAAA-MM-DD).
                  base_legal:
                    type: string
                  aviso:
                    type: string
        "422":
          description: Data inválida ou parâmetros incorretos.
