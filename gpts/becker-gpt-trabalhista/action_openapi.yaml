openapi: 3.1.0
info:
  title: Becker - Base de Conhecimento Trabalhista
  description: Consulta a base de conhecimento (doutrina/estratégia/cálculos trabalhistas), a jurisprudência verificada, processos no DataJud CNJ e cálculo de prazos.
  version: 1.1.0
servers:
  - url: https://bpzuktssvdosxlxbaeyl.supabase.co/functions/v1
    description: Edge Functions — buscar (knowledge base)
  - url: https://bpzuktssvdosxlxbaeyl.supabase.co/functions/v1/becker-juris
    description: Edge Functions — becker-juris (processos e prazos)
paths:
  /buscar:
    post:
      operationId: buscarConhecimento
      summary: Busca híbrida na base de conhecimento ou na jurisprudência trabalhista verificada.
      description: >
        Use tabela="base" para método, teses, cálculos, estratégia processual e peças de referência trabalhistas.
        Use tabela="jurisprudencia" para precedentes (retorna SOMENTE precedentes verificados — TST, TRT 12ª, TRT 4ª).
        Sempre consulte esta ação ANTES de redigir qualquer peça ou afirmar tese.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Pergunta ou tema em linguagem natural.
                tabela:
                  type: string
                  enum: [base, jurisprudencia]
                  default: base
                materia:
                  type: string
                  description: >-
                    Filtro opcional. Exemplos: "HORAS_EXTRAS", "RESCISAO_INDIRETA",
                    "FGTS", "DANO_MORAL", "VINCULO_EMPREGADO", "TERCEIRIZACAO",
                    "INSALUBRIDADE", "ACIDENTE_TRABALHO", "ESTABILIDADE",
                    "VERBAS_RESCISORIAS", "PRESCRICAO", "REFORMA_TRABALHISTA".
                tipo_peca:
                  type: string
                  description: Filtro opcional. Exemplos: "INICIAL", "REPLICA", "RECURSO_ORDINARIO", "EMBARGOS", "RECURSO_REVISTA".
                pasta:
                  type: string
                  enum: [AUDITORIA_TRABALHISTA, FUNDACAO, MATERIAS, PECAS_REFERENCIA, CALCULOS]
                nivel:
                  type: string
                  enum: [CRÍTICO, ALTO, MÉDIO, BAIXO]
                tema:
                  type: string
                  description: Filtro de jurisprudência (ex. "HORAS_EXTRAS", "BANCO_DE_HORAS", "RESCISAO_INDIRETA", "DANO_MORAL", "TERCEIRIZACAO").
                tribunal:
                  type: string
                  enum: [TST, TRT12, TRT4, STF]
                incluir_lacuna:
                  type: boolean
                  default: true
                k:
                  type: integer
                  default: 8
      responses:
        "200":
          description: Resultados ordenados por relevância.
          content:
            application/json:
              schema:
                type: object
                properties:
                  resultados:
                    type: array
                    items:
                      type: object

  /processos/buscar:
    post:
      operationId: buscarProcesso
      servers:
        - url: https://bpzuktssvdosxlxbaeyl.supabase.co/functions/v1/becker-juris
      summary: Consulta processo pelo número CNJ em qualquer tribunal do DataJud.
      description: >
        Retorna dados completos do processo (classe, assuntos, órgão julgador, grau,
        data de ajuizamento, últimas movimentações). Funciona para TRT, TST, TJSC e outros.
        Use quando o usuário informar número de processo. Não é jurisprudência citável.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [numero]
              properties:
                numero:
                  type: string
                  description: Número CNJ do processo (ex. 0001234-00.2024.5.12.0001 para TRT12).
      responses:
        "200":
          description: Dados do processo.

  /prazos/calcular:
    post:
      operationId: calcularPrazo
      servers:
        - url: https://bpzuktssvdosxlxbaeyl.supabase.co/functions/v1/becker-juris
      summary: Calcula prazo processual em dias úteis (CPC arts. 219, 220, 224 — aplicável à CLT subsidiariamente).
      description: >
        Calcula data de vencimento excluindo sábados, domingos e feriados nacionais.
        Prazos trabalhistas comuns: recurso ordinário (8 dias úteis), recurso de revista (8),
        embargos de declaração (5), contestação (5 dias — art. 847 CLT, mas em dias corridos; use com cautela).
        Sempre exiba o aviso sobre recessos e suspensões.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data_inicio, dias_uteis]
              properties:
                data_inicio:
                  type: string
                  description: Data de publicação/intimação (AAAA-MM-DD).
                dias_uteis:
                  type: integer
                  minimum: 1
                  maximum: 365
      responses:
        "200":
          description: Prazo calculado com data de vencimento.
