name: DJEN Diário — Coleta PJe

on:
  schedule:
    # 07h BRT = 10h UTC, segunda a sexta
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      data:
        description: 'Data (AAAA-MM-DD). Deixe vazio para hoje.'
        required: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Coletar DJEN e enviar para Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          MONITOR_SECRET: ${{ secrets.MONITOR_SECRET }}
          DATA_ALVO: ${{ inputs.data }}
        run: python djen/scripts/djen_coletar.py
